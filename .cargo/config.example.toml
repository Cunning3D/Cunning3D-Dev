[env]
# For wasm32-unknown-unknown: avoid inheriting problematic global flags (e.g. CFLAGS="/MD").
CFLAGS_wasm32_unknown_unknown = { value = "", force = true }
CC_wasm32_unknown_unknown = { value = "clang", force = true }

[build]
# Optional: set your own local target-dir to keep workspace clean.
# target-dir = "F:/cargo-target2/Cunning3D_1.0"

[target.x86_64-pc-windows-msvc]
# Optional: tweak per-machine as needed.
rustflags = ["-C", "target-feature=-crt-static"]

[profile.release]
lto = "thin"

[profile.dev.package."*"]
opt-level = 3

[profile.test.package."*"]
opt-level = 3

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

[alias]
run-voice = "run --features voice_full"

