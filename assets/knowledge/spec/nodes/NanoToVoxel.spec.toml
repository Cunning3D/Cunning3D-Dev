[node]
name = "Nano To Voxel"
category = "AI Generation"
summary = "Generate GPU-preview voxels from a prompt or reference image via Gemini 3x2 depth atlas -> point cloud -> sparse voxel chunks."

[ports]
inputs = [{ key = "in:0", label = "Input (optional)", type = "Geometry", optional = true }]
outputs = [{ key = "out:0", label = "Voxel", type = "Voxel" }]

[[params]]
name = "__ai_system_prompt"
type = "string"
default = ""
ui = { kind = "code" }
meaning = "System prompt used to constrain the 3x2 depth atlas generation."

[[params]]
name = "prompt"
type = "string"
default = "A stylized banana figurine, clean silhouette."
ui = { kind = "string" }
meaning = "User prompt describing the object to voxelize."

[[params]]
name = "reference_image"
type = "filepath"
default = ""
ui = { kind = "file_path", filters = ["png", "jpg", "jpeg", "webp"] }
meaning = "Optional reference image for image-conditioned generation."

[[params]]
name = "tile_res"
type = "int"
default = 256
units = "px"
range = [64, 1024]
ui = { kind = "int_slider", min = 64, max = 1024 }
meaning = "Per-tile resolution for the 3x2 depth atlas."

[[params]]
name = "world_size"
type = "float"
default = 1.0
units = "scene"
range = [0.01, 100.0]
ui = { kind = "float_slider", min = 0.01, max = 100.0 }
meaning = "World-space cube size used when unprojecting depth pixels."

[[params]]
name = "sample_step"
type = "int"
default = 4
units = "px"
range = [1, 16]
ui = { kind = "int_slider", min = 1, max = 16 }
meaning = "Pixel stride when extracting points from the depth atlas."

[[params]]
name = "depth_min"
type = "float"
default = 0.05
range = [0.0, 0.5]
ui = { kind = "float_slider", min = 0.0, max = 0.5 }
meaning = "Depth threshold below which pixels are treated as background."

[[params]]
name = "voxel_size"
type = "float"
default = 0.05
units = "scene"
range = [0.001, 10.0]
ui = { kind = "float_slider", min = 0.001, max = 10.0 }
meaning = "World size per voxel in the output grid."

[[params]]
name = "palette_index"
type = "int"
default = 1
units = "index"
range = [1, 255]
ui = { kind = "int_slider", min = 1, max = 255 }
meaning = "Palette index assigned to all generated voxels."

[[params]]
name = "timeout_s"
type = "int"
default = 0
units = "s"
range = [0, 1800]
ui = { kind = "int_slider", min = 0, max = 1800 }
meaning = "Gemini request timeout (0 = unlimited)."

[[params]]
name = "generate"
type = "int"
default = 0
ui = { kind = "button" }
meaning = "Start the generation pipeline."

[semantics]
algorithm = """
1) Request a 3x2 orthographic depth atlas from Gemini (grayscale, fixed tile layout).
2) Extract a point cloud by unprojecting depth pixels for each of the 6 faces.
3) Rasterize points into sparse voxel chunks and register them for GPU voxel preview.
"""
edge_cases = [
  "Missing Gemini API key results in failure and no output",
  "If no points can be extracted, output is empty",
]
determinism = "Non-deterministic due to AI generation; deterministic once depth atlas is fixed."

[performance]
time = "AI request dominates; local voxel raster is O(P) points."
memory = "Sparse chunk storage; chunk count grows with object size / voxel_size."
caching = "Cache by (depth_atlas_path, voxel_size, palette_index, world_size, sample_step, depth_min)."

[validation]
fingerprint_fields = ["detail_attrs.__voxel_node", "detail_attrs.__voxel_size"]
tolerance = {}
recipe = """
1) Run once to produce a depth atlas.
2) Verify output geometry contains __voxel_node and __voxel_size detail attributes.
3) Change voxel_size and verify __voxel_size updates and chunk density changes in viewport.
"""

