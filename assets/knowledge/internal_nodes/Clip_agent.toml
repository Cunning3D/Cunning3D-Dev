name = "Clip"
category = "Modeling"
description = "Deletes primitives that lie entirely on one side of a clipping plane."

[io]
input_type = "Single"
output_type = "Geometry"

[[io.inputs]]
index = 0
name = "Input"
description = "输入几何体，将被平面裁剪"

[[io.outputs]]
index = 0
name = "Output"
description = "裁剪后的几何体，移除丢弃侧的图元"

[parameters]
origin = "Vec3. A point on the clip plane. Default: (0, 0, 0)."
direction = "Vec3. Plane normal (normalized). Default: (0, 1, 0)."
keep_side = "String. Keep side selector (\"Keep Above\" or \"Keep Below\"). Default: Keep Above."

[usage]
text = """
Removes primitives whose vertices are all on the discarded side of the plane.
Keeps only Above (dist>=0) or Below (dist<=0) depending on Keep Side.
This is a delete-only clip (no new cut surface is generated).
"""
